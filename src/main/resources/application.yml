# yaml-language-server: $schema=https://raw.githubusercontent.com/spring-projects/spring-boot/master/spring-boot-project/spring-boot-tools/spring-boot-configuration-metadata-json-schema/src/main/resources/schema/spring-configuration-metadata.json
spring:
  application:
    name: ai-agent
  profiles:
    active: prod
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi 接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: org.zjh.aiagent.controller
# knife4j 增强配置，不需要可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn